<!DOCTYPE html>
<html>
<head>
  <title>Student Risk Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #0f63ff;
      --primary-dark: #0a47b5;
      --accent: #2bb673;
      --danger: #e24b5a;
      --text: #233142;
      --muted: #6b7280;
      --surface: rgba(255, 255, 255, 0.9);
      --border: rgba(15, 99, 255, 0.12);
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background:
        linear-gradient(rgba(244, 248, 255, 0.78), rgba(238, 244, 255, 0.78)),
        url("{{ url_for('static', filename='background2.jpg') }}") center / cover fixed;
      color: var(--text);
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px;
      box-sizing: border-box;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 16px;
      flex-wrap: wrap;
    }

    h2 {
      margin: 0;
      font-size: 2rem;
      color: var(--primary-dark);
    }

    .header-pill {
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      box-shadow: 0 6px 14px rgba(15, 99, 255, 0.18);
    }

    .card {
      background: var(--surface);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(17, 34, 68, 0.08);
      padding: 18px;
      border: 1px solid var(--border);
      box-sizing: border-box;
      min-width: 0;
      overflow: hidden;
    }

    .card h3 {
      margin: 0 0 12px;
      color: var(--primary-dark);
      font-size: 1.05rem;
    }

    .stats-row {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-bottom: 20px;
    }

    .stat-card {
      background: linear-gradient(135deg, #ffffff 0%, #f4f8ff 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.86rem;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary-dark);
    }

    .charts {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 20px;
      align-items: start;
    }

    .chart-card canvas {
      display: block;
      width: 100% !important;
      height: 180px !important;
      max-height: 180px;
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: minmax(0, 1.7fr) minmax(0, 1fr);
      align-items: start;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid #ececec;
      text-align: left;
    }

    th {
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }

    tbody tr {
      transition: background 0.2s ease;
    }

    tbody tr:hover {
      background: #f2f7ff;
      cursor: pointer;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(15, 99, 255, 0.15);
    }

    .button-primary { background: var(--primary); color: white; }
    .button-danger { background: var(--danger); color: white; }
    .button-secondary { background: var(--accent); color: white; }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: var(--text);
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d8e2f0;
      border-radius: 10px;
      box-sizing: border-box;
      background: #fff;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .detail-row .form-group {
      margin-bottom: 0;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 28px 0;
    }

    @media (max-width: 900px) {
      .charts,
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h2>Student Risk Dashboard</h2>
      <div class="header-pill">Live student monitoring</div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Students</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">High Risk</div>
        <div class="stat-value" id="statHigh">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Average Attendance</div>
        <div class="stat-value" id="statAttendance">0%</div>
      </div>
    </div>

    <div class="charts">
      <div class="card chart-card">
        <h3>Progress Overview</h3>
        <canvas id="barChart"></canvas>
      </div>
      <div class="card chart-card">
        <h3>Risk Distribution</h3>
        <canvas id="pieChart"></canvas>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Student List</h3>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Programme</th>
              <th>Risk</th>
            </tr>
          </thead>
          <tbody id="studentTable"></tbody>
        </table>
        <div id="emptyMessage" class="empty-state" style="display:none;">No students available. Add a student below.</div>
      </div>

      <div class="card" id="detailCard">
        <h3>Selected Student</h3>
        <div id="studentDetails" class="empty-state">Click a student to view details.</div>
      </div>
    </div>

    <div class="card">
      <h3>Add New Student</h3>
      <div class="detail-row">
        <div class="form-group">
          <label for="nameInput">Name</label>
          <input id="nameInput" type="text" placeholder="Student name">
        </div>
        <div class="form-group">
          <label for="programmeInput">Programme</label>
          <input id="programmeInput" type="text" placeholder="Programme">
        </div>
      </div>
      <div class="detail-row">
        <div class="form-group">
          <label for="gpaInput">GPA</label>
          <input id="gpaInput" type="number" step="0.01" min="0" max="4" placeholder="GPA">
        </div>
        <div class="form-group">
          <label for="attendanceInput">Attendance (%)</label>
          <input id="attendanceInput" type="number" step="0.1" min="0" max="100" placeholder="Attendance">
        </div>
      </div>
      <div class="form-group">
        <label for="feesInput">Fees Balance</label>
        <input id="feesInput" type="number" step="0.01" min="0" placeholder="Fees balance">
      </div>
      <button class="button button-primary" id="addStudentButton">Add Student</button>
    </div>
  </div>

  <script>
    let selectedStudentId = null;
    let barChart;
    let pieChart;

    async function fetchStudents() {
      const response = await fetch('/students');
      const students = await response.json();
      renderStudentTable(students);
      renderCharts(students);
      return students;
    }

    function formatCurrency(value) {
      return '$' + Number(value).toFixed(2);
    }

    function renderStudentTable(students) {
      const tableBody = document.getElementById('studentTable');
      const emptyMessage = document.getElementById('emptyMessage');
      tableBody.innerHTML = '';
      if (!students.length) {
        emptyMessage.style.display = 'block';
        return;
      }
      emptyMessage.style.display = 'none';

      students.forEach(student => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${student.name}</td>
          <td>${student.programme}</td>
          <td>${student.risk}</td>
        `;
        row.addEventListener('click', () => selectStudent(student.id));
        tableBody.appendChild(row);
      });
    }

    function renderCharts(students) {
      const labels = students.map(s => s.name);
      const gpaData = students.map(s => s.gpa);
      const attendanceData = students.map(s => s.attendance);
      const feesData = students.map(s => s.fees_balance);
      const riskCounts = { High: 0, Medium: 0, Low: 0 };

      document.getElementById('statTotal').textContent = students.length;
      document.getElementById('statHigh').textContent = students.filter(s => s.risk === 'High').length;
      const avgAttendance = students.length ? Math.round(students.reduce((sum, s) => sum + s.attendance, 0) / students.length) : 0;
      document.getElementById('statAttendance').textContent = `${avgAttendance}%`;

      students.forEach(s => {
        if (riskCounts[s.risk] !== undefined) riskCounts[s.risk]++;
      });

      const barData = {
        labels,
        datasets: [
          { label: 'GPA', data: gpaData, backgroundColor: '#0f63ff' },
          { label: 'Attendance', data: attendanceData, backgroundColor: '#28a745' },
          { label: 'Fees Balance', data: feesData, backgroundColor: '#dc3545' }
        ]
      };

      const pieData = {
        labels: Object.keys(riskCounts),
        datasets: [{ data: Object.values(riskCounts), backgroundColor: ['#dc3545', '#ffc107', '#28a745'] }]
      };

      const barCtx = document.getElementById('barChart').getContext('2d');
      const pieCtx = document.getElementById('pieChart').getContext('2d');

      if (barChart) barChart.destroy();
      if (pieChart) pieChart.destroy();

      barChart = new Chart(barCtx, {
        type: 'bar',
        data: barData,
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
      });

      pieChart = new Chart(pieCtx, {
        type: 'pie',
        data: pieData,
        options: { responsive: true }
      });
    }

    async function selectStudent(studentId) {
      selectedStudentId = studentId;
      const response = await fetch(`/students/${studentId}`);
      const student = await response.json();
      const detailCard = document.getElementById('studentDetails');
      detailCard.innerHTML = `
        <div class="detail-row">
          <div class="form-group"><label>Name</label><input id="detailName" value="${student.name}" type="text"></div>
          <div class="form-group"><label>Programme</label><input id="detailProgramme" value="${student.programme}" type="text"></div>
        </div>
        <div class="detail-row">
          <div class="form-group"><label>GPA</label><input id="detailGpa" value="${student.gpa}" type="number" step="0.01"></div>
          <div class="form-group"><label>Attendance</label><input id="detailAttendance" value="${student.attendance}" type="number" step="0.1"></div>
        </div>
        <div class="form-group"><label>Fees Balance</label><input id="detailFees" value="${student.fees_balance}" type="number" step="0.01"></div>
        <div class="form-group"><strong>Risk:</strong> ${student.risk}</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:16px;">
          <button class="button button-secondary" id="updateStudentButton">Save Changes</button>
          <button class="button button-danger" id="deleteStudentButton">Delete Student</button>
        </div>
      `;

      document.getElementById('updateStudentButton').addEventListener('click', updateStudent);
      document.getElementById('deleteStudentButton').addEventListener('click', deleteStudent);
    }

    async function updateStudent() {
      if (!selectedStudentId) return;
      const payload = {
        name: document.getElementById('detailName').value,
        programme: document.getElementById('detailProgramme').value,
        gpa: parseFloat(document.getElementById('detailGpa').value) || 0,
        attendance: parseFloat(document.getElementById('detailAttendance').value) || 0,
        fees_balance: parseFloat(document.getElementById('detailFees').value) || 0
      };
      await fetch(`/students/${selectedStudentId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      await fetchStudents();
      await selectStudent(selectedStudentId);
    }

    async function deleteStudent() {
      if (!selectedStudentId) return;
      await fetch(`/students/${selectedStudentId}`, { method: 'DELETE' });
      selectedStudentId = null;
      document.getElementById('studentDetails').innerHTML = 'Click a student to view details.';
      await fetchStudents();
    }

    async function addStudent() {
      const payload = {
        name: document.getElementById('nameInput').value,
        programme: document.getElementById('programmeInput').value,
        gpa: parseFloat(document.getElementById('gpaInput').value) || 0,
        attendance: parseFloat(document.getElementById('attendanceInput').value) || 0,
        fees_balance: parseFloat(document.getElementById('feesInput').value) || 0
      };
      await fetch('/students', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      document.getElementById('nameInput').value = '';
      document.getElementById('programmeInput').value = '';
      document.getElementById('gpaInput').value = '';
      document.getElementById('attendanceInput').value = '';
      document.getElementById('feesInput').value = '';
      await fetchStudents();
    }

    document.getElementById('addStudentButton').addEventListener('click', addStudent);
    fetchStudents();
  </script>
</body>
</html>
